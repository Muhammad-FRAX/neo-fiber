# docker-compose.dev.yaml — DEV ONLY
#
# Runs just the app-db (PostGIS). The app itself runs locally via `npm run dev`.
# Production Dockerfile + docker-compose.yaml are deferred to Phase 9 per DESIGN.md.
#
# Usage:
#   docker compose -f docker-compose.dev.yaml up -d   # start DB
#   docker compose -f docker-compose.dev.yaml down     # stop DB
#   npm run migrate                                    # apply migrations (from backend/)

services:
  app-db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: neo_fiber
      POSTGRES_USER: neo_fiber
      POSTGRES_PASSWORD: neo_fiber_dev
    ports:
      - "5432:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neo_fiber -d neo_fiber"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app-db-data:
